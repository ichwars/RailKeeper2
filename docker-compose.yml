services:
  railkeeper2:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: railkeeper2:local
    container_name: railkeeper2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RAILKEEPER_ADDR: ":8080"
      RAILKEEPER_DATA_DIR: /data
      RAILKEEPER_MIGRATIONS_DIR: /app/migrations
      RAILKEEPER_SEEDS_DIR: /app/seeds
      RAILKEEPER_STATIC_DIR: /app/web
      RAILKEEPER_COOKIE_SECURE: "${RAILKEEPER_COOKIE_SECURE:-false}"
      RAILKEEPER_MAX_IMAGE_MB: "${RAILKEEPER_MAX_IMAGE_MB:-10}"
      RAILKEEPER_MAX_ATTACHMENT_MB: "${RAILKEEPER_MAX_ATTACHMENT_MB:-25}"
      RAILKEEPER_ALLOWED_ATTACHMENT_EXTENSIONS: "${RAILKEEPER_ALLOWED_ATTACHMENT_EXTENSIONS:-.pdf,.txt,.csv,.json,.xml,.zip,.jpg,.jpeg,.png,.webp}"
      RAILKEEPER_UPDATE_CHECK_URL: "${RAILKEEPER_UPDATE_CHECK_URL:-https://api.github.com/repos/ichwars/RailKeeper2/releases/latest}"
      RAILKEEPER_PRINTERS: "${RAILKEEPER_PRINTERS:-}"
      RAILKEEPER_DEFAULT_PRINTER: "${RAILKEEPER_DEFAULT_PRINTER:-}"
    volumes:
      - railkeeper2_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

volumes:
  railkeeper2_data:
