openapi: 3.1.0
info:
  title: RailKeeper2 API
  version: 0.1.0
servers:
  - url: /api/v1
tags:
  - name: Setup
  - name: Auth
  - name: System
  - name: Users
  - name: Vehicles
  - name: InventoryNumbers
  - name: MasterData
  - name: ArticleSearch
  - name: Backup
  - name: Audit
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: rk_session
  schemas:
    Problem:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    SetupStatus:
      type: object
      required: [setupRequired]
      properties:
        setupRequired:
          type: boolean
    CreateAdminRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 12
    Session:
      type: object
      required: [username, roles, csrfToken]
      properties:
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        csrfToken:
          type: string
    SessionRecord:
      type: object
      required: [id, userId, username, createdAt, expiresAt, active]
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
        active:
          type: boolean
    Role:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    UserAccount:
      type: object
      required: [id, username, roles, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    UserAccountInput:
      type: object
      required: [username, roles]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 12
          description: Required when creating a user. Omit or leave empty on update to keep the current password.
        roles:
          type: array
          minItems: 1
          items:
            type: string
    AuditLogEntry:
      type: object
      required: [id, action, createdAt, detailsJson]
      properties:
        id:
          type: string
        actorUserId:
          type: string
        actorUsername:
          type: string
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        createdAt:
          type: string
          format: date-time
        detailsJson:
          type: string
    AuditLogResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
    SystemPrinters:
      type: object
      required: [status, message, printers]
      properties:
        status:
          type: string
          enum: [available, configured, unavailable]
        message:
          type: string
        defaultPrinter:
          type: string
        printers:
          type: array
          items:
            type: object
            required: [id, name, isDefault]
            properties:
              id:
                type: string
              name:
                type: string
              isDefault:
                type: boolean
    Vehicle:
      type: object
      required: [id, inventoryNumber, manufacturer, name, gauge, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        inventoryNumber:
          type: string
        manufacturer:
          type: string
        articleNumber:
          type: string
        articleSourceUrl:
          type: string
        name:
          type: string
        gauge:
          type: string
        epoch:
          type: string
        railwayCompany:
          type: string
        category:
          type: string
        gattung:
          type: string
        description:
          type: string
        series:
          type: string
        vehicleNumber:
          type: string
        digital:
          type: boolean
        digitalDecoderNumber:
          type: string
        dtDecoder:
          type: boolean
        dtDecoderNumber:
          type: string
        exhibitionReady:
          type: boolean
        abcBrakes:
          type: boolean
        ean:
          type: string
        productionPeriod:
          type: string
        listPrice:
          type: string
        lengthMm:
          type: string
        weightG:
          type: string
        color:
          type: string
        lettering:
          type: string
        load:
          type: string
        interior:
          type: string
        axles:
          type: string
        axleCount:
          type: string
        tractionTireCount:
          type: string
        wheelset:
          type: string
        couplingSame:
          type: boolean
        couplingFront:
          type: string
        couplingRear:
          type: string
        powerPickup:
          type: string
        adapter:
          type: string
        driveEnabled:
          type: boolean
        driveDescription:
          type: string
        headlightsEnabled:
          type: boolean
        headlightsDescription:
          type: string
        lightingEnabled:
          type: boolean
        lightingDescription:
          type: string
        soundGeneratorEnabled:
          type: boolean
        soundGeneratorDescription:
          type: string
        smokeGeneratorEnabled:
          type: boolean
        smokeGeneratorDescription:
          type: string
        additionalInfo:
          type: string
        qrCodeEnabled:
          type: boolean
        images:
          type: array
          items:
            $ref: "#/components/schemas/VehicleImage"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/VehicleAttachment"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateVehicleRequest:
      type: object
      required: [manufacturer, name, gauge]
      properties:
        inventoryNumber:
          type: string
        manufacturer:
          type: string
        articleNumber:
          type: string
        articleSourceUrl:
          type: string
        name:
          type: string
        gauge:
          type: string
        epoch:
          type: string
        railwayCompany:
          type: string
        category:
          type: string
        gattung:
          type: string
        description:
          type: string
        series:
          type: string
        vehicleNumber:
          type: string
        digital:
          type: boolean
        digitalDecoderNumber:
          type: string
        dtDecoder:
          type: boolean
        dtDecoderNumber:
          type: string
        exhibitionReady:
          type: boolean
        abcBrakes:
          type: boolean
        ean:
          type: string
        productionPeriod:
          type: string
        listPrice:
          type: string
        lengthMm:
          type: string
        weightG:
          type: string
        color:
          type: string
        lettering:
          type: string
        load:
          type: string
        interior:
          type: string
        axles:
          type: string
        axleCount:
          type: string
        tractionTireCount:
          type: string
        wheelset:
          type: string
        couplingSame:
          type: boolean
        couplingFront:
          type: string
        couplingRear:
          type: string
        powerPickup:
          type: string
        adapter:
          type: string
        driveEnabled:
          type: boolean
        driveDescription:
          type: string
        headlightsEnabled:
          type: boolean
        headlightsDescription:
          type: string
        lightingEnabled:
          type: boolean
        lightingDescription:
          type: string
        soundGeneratorEnabled:
          type: boolean
        soundGeneratorDescription:
          type: string
        smokeGeneratorEnabled:
          type: boolean
        smokeGeneratorDescription:
          type: string
        additionalInfo:
          type: string
        qrCodeEnabled:
          type: boolean
        images:
          type: array
          items:
            $ref: "#/components/schemas/VehicleImageInput"
    VehicleImage:
      type: object
      required: [id, vehicleId, url, isPrimary, sortOrder, createdAt]
      properties:
        id:
          type: string
        vehicleId:
          type: string
        url:
          type: string
        title:
          type: string
        sourceUrl:
          type: string
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
    VehicleImageInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: string
        sourceUrl:
          type: string
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
    VehicleAttachment:
      type: object
      required: [id, vehicleId, fileName, originalName, sizeBytes, createdAt, updatedAt]
      properties:
        id:
          type: string
        vehicleId:
          type: string
        fileName:
          type: string
        originalName:
          type: string
        description:
          type: string
        category:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VehicleAttachmentUpdateRequest:
      type: object
      properties:
        description:
          type: string
        category:
          type: string
    MasterDataEntry:
      type: object
      required: [id, type, key, label, active, sortOrder, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
        key:
          type: string
        label:
          type: string
        active:
          type: boolean
        sortOrder:
          type: integer
        sourceUrl:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MasterDataInput:
      type: object
      required: [label]
      properties:
        key:
          type: string
        label:
          type: string
        active:
          type: boolean
        sortOrder:
          type: integer
        sourceUrl:
          type: string
        metadata:
          type: object
          additionalProperties: true
    MasterDataRelation:
      type: object
      required: [id, parentType, parentKey, childType, childKey, sortOrder]
      properties:
        id:
          type: string
        parentType:
          type: string
        parentKey:
          type: string
        childType:
          type: string
        childKey:
          type: string
        sortOrder:
          type: integer
    MasterDataDocument:
      type: object
      required: [format, version, createdAt, entries, relations]
      properties:
        format:
          type: string
          example: railkeeper2-master-data
        version:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        entries:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/MasterDataEntry"
        relations:
          type: array
          items:
            $ref: "#/components/schemas/MasterDataRelation"
    MasterDataImportResult:
      type: object
      required: [importedTypes, importedEntries, importedRelations]
      properties:
        importedTypes:
          type: integer
        importedEntries:
          type: integer
        importedRelations:
          type: integer
    InventoryNumberScheme:
      type: object
      required: [id, category, prefix, nextNumber, padding, active, preview, createdAt, updatedAt]
      properties:
        id:
          type: string
        category:
          type: string
        prefix:
          type: string
        nextNumber:
          type: integer
          minimum: 1
        padding:
          type: integer
          minimum: 1
          maximum: 12
        active:
          type: boolean
        preview:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InventoryNumberSchemeInput:
      type: object
      required: [prefix, nextNumber, padding, active]
      properties:
        prefix:
          type: string
        nextNumber:
          type: integer
          minimum: 1
        padding:
          type: integer
          minimum: 1
          maximum: 12
        active:
          type: boolean
    ArticleSearchInput:
      type: object
      properties:
        manufacturer:
          type: string
        articleNumber:
          type: string
        name:
          type: string
        gauge:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    ArticleSearchField:
      type: object
      required: [label, value, confidence]
      properties:
        label:
          type: string
        value:
          type: string
        confidence:
          type: integer
    ArticleSearchImage:
      type: object
      required: [url, title, source]
      properties:
        url:
          type: string
        title:
          type: string
        source:
          type: string
    ArticleSearchResult:
      type: object
      required: [source, title, url, snippet, score, fields]
      properties:
        source:
          type: string
        title:
          type: string
        url:
          type: string
        snippet:
          type: string
        score:
          type: integer
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ArticleSearchField"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ArticleSearchImage"
        conflicts:
          type: array
          items:
            type: string
    ArticleSearchResponse:
      type: object
      required: [query, results]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/ArticleSearchResult"
    VehicleImportPreview:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          description: Tabellenzeilen aus der ersten Arbeitsmappe. Die erste Zeile enthält die Header.
          items:
            type: array
            items:
              type: string
    VehicleCVFilePreview:
      type: object
      required: [fileName, sizeBytes, mimeType, hasMetadata]
      properties:
        fileName:
          type: string
        sizeBytes:
          type: integer
          format: int64
        mimeType:
          type: string
        hasMetadata:
          type: boolean
        projectName:
          type: string
        address:
          type: string
        type:
          type: string
        decoder:
          type: string
        manufacturer:
          type: string
        manufacturerId:
          type: string
        lokProgrammer:
          type: string
        suggestedDecoderProfile:
          type: string
        suggestedDescription:
          type: string
        suggestedCvValues:
          type: array
          items:
            type: object
            required: [cvNumber, value]
            properties:
              cvNumber:
                type: integer
              value:
                type: integer
              description:
                type: string
              category:
                type: string
        suggestedFunctions:
          type: array
          items:
            type: object
            required: [functionKey, name]
            properties:
              functionKey:
                type: string
              name:
                type: string
              functionType:
                type: string
        suggestedPreviewImage:
          type: object
          required: [mimeType, width, height, dataUrl]
          properties:
            mimeType:
              type: string
            width:
              type: integer
            height:
              type: integer
            dataUrl:
              type: string
    BackupImportResult:
      type: object
      required: [restoredTables, restoredRows, restoredFiles]
      properties:
        restoredTables:
          type: integer
        restoredRows:
          type: integer
        restoredFiles:
          type: integer
paths:
  /setup/status:
    get:
      tags: [Setup]
      security: []
      responses:
        "200":
          description: Setup state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
  /setup/admin:
    post:
      tags: [Setup]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminRequest"
      responses:
        "201":
          description: Admin user created
        "400":
          description: Weak input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /auth/session:
    get:
      tags: [Auth]
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /auth/login:
    post:
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /auth/logout:
    post:
      tags: [Auth]
      responses:
        "204":
          description: Logged out
  /auth/password:
    put:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed and other user sessions revoked
        "400":
          description: Weak password or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Current password invalid or not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /system/printers:
    get:
      tags: [System]
      responses:
        "200":
          description: System printers or configured printer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemPrinters"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /system/audit-log:
    get:
      tags: [Audit]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Recent security and audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /roles:
    get:
      tags: [Users]
      responses:
        "200":
          description: Available roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /users:
    get:
      tags: [Users]
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserAccount"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAccountInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccount"
        "400":
          description: Invalid user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Duplicate user or last admin protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /users/{id}:
    put:
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAccountInput"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccount"
        "400":
          description: Invalid user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Duplicate user or last admin protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Last admin protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /sessions:
    get:
      tags: [Users]
      responses:
        "200":
          description: Recent local sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionRecord"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /sessions/{id}/revoke:
    put:
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session revoked
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /vehicles:
    get:
      tags: [Vehicles]
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      tags: [Vehicles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequest"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          description: Invalid vehicle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /vehicle-import/preview:
    post:
      tags: [Vehicles]
      summary: Preview a vehicle import file
      description: Reads a supported import file and returns table rows for client-side review. Currently supports XLSX and ODS.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Parsed table rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleImportPreview"
        "400":
          description: Invalid or unsupported import file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /cv-files/preview:
    post:
      tags: [Vehicles]
      summary: Preview CV or decoder project file metadata
      description: Reads a CV/decoder file without storing it and returns safe metadata suggestions, including ESU/LokProgrammer project metadata when available.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
